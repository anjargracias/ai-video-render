name: render-video-final

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg wget

      - name: Debug workspace
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la $GITHUB_WORKSPACE

      - name: Create clips directory
        run: mkdir -p $GITHUB_WORKSPACE/clips

      - name: Download multiple sample videos
        run: |
          cd $GITHUB_WORKSPACE/clips
          for i in {1..10}; do
            wget -q --show-progress https://samplelib.com/lib/preview/mp4/sample-5s.mp4 -O clip_$i.mp4 || echo "Download $i failed"
          done

      - name: Cut random 5-7s segments
        run: |
          cd $GITHUB_WORKSPACE/clips
          mkdir -p segments
          for f in clip_*.mp4; do
            # random start 0-3s
            start=$((RANDOM % 3))
            duration=$((5 + RANDOM % 3))
            ffmpeg -ss $start -i "$f" -t $duration -c copy "segments/segment_$f" -y
          done

      - name: Concatenate segments
        run: |
          cd $GITHUB_WORKSPACE/clips
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -f concat -safe 0 -i segments.txt -c copy "$GITHUB_WORKSPACE/output.mp4" -y

      - name: Create thumbnail
        run: |
          ffmpeg -i "$GITHUB_WORKSPACE/output.mp4" -ss 00:00:01 -vframes 1 "$GITHUB_WORKSPACE/thumb.jpg" -y

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: |
            $GITHUB_WORKSPACE/output.mp4
            $GITHUB_WORKSPACE/thumb.jpg
