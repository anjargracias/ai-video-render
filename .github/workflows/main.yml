name: render-video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: install ffmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: download sample video
        run: wget https://samplelib.com/lib/preview/mp4/sample-5s.mp4 -O video.mp4

      - name: render video
        run: ffmpeg -stream_loop 10 -i video.mp4 -t 300 -c copy output.mp4
