name: render-multi-clip-video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Prepare folders
        run: |
          mkdir -p clips segments

      - name: Download sample clips
        run: |
          for i in {1..10}; do
            wget -q "https://samplelib.com/lib/preview/mp4/sample-5s.mp4" -O "clips/clip$i.mp4"
          done

      - name: Cut random 5-7s segments
        run: |
          for f in clips/*.mp4; do
            dur=$((RANDOM % 3 + 5))
            ffmpeg -y -ss 0 -t $dur -i "$f" -c copy "segments/$(basename "$f")"
          done

      - name: Concatenate segments
        run: |
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -y -f concat -safe 0 -i segments.txt -c copy output.mp4

      - name: Generate thumbnail
        run: ffmpeg -y -i output.mp4 -ss 00:00:01 -vframes 1 thumb.jpg

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4

      - name: Upload thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail
          path: thumb.jpg
      - name: Concatenate segments
        run: |
          ffmpeg -f concat -safe 0 -i segments.txt -c:v libx264 -crf 23 -preset veryfast -c:a aac output.mp4

      - name: Generate thumbnail
        run: ffmpeg -i output.mp4 -ss 00:00:01 -vframes 1 thumbnail.png

      - name: List output files
        run: ls -lh output.mp4 thumbnail.png
