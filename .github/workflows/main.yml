name: render-video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v3

      # 2️⃣ Install FFmpeg
      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      # 3️⃣ Download sample video (opsional, bisa dihapus kalau pakai video sendiri)
      - name: Download sample video
        run: |
          mkdir -p segments
          wget https://samplelib.com/lib/preview/mp4/sample-5s.mp4 -O segments/video1.mp4
          cp segments/video1.mp4 segments/video2.mp4
          cp segments/video1.mp4 segments/video3.mp4

      # 4️⃣ Generate segments.txt untuk concat
      - name: Create segments list
        run: |
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          cat segments.txt

      # 5️⃣ Render / gabungkan video dengan FFmpeg
      - name: Render video
        run: |
          # Gunakan re-encode agar aman jika codec berbeda
          ffmpeg -f concat -safe 0 -i segments.txt -c:v libx264 -crf 23 -preset veryfast -c:a aac output.mp4

      # 6️⃣ Cek hasil output
      - name: List output
        run: ls -lh output.mp4          name: rendered-video
          path: output/output.mp4
