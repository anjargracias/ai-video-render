name: render-video-final

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg jq wget

      - name: Set topic
        run: |
          TOPIC=$(cat topic.txt)
          echo "Topic: $TOPIC"

      - name: Download and process clips
        run: |
          mkdir -p clips
          COUNT=0
          TARGET=$((10 + RANDOM % 6))
          while [ $COUNT -lt $TARGET ]; do
            VIDEO=""
            # Pixabay
            URL="https://pixabay.com/api/videos/?key=YOUR_KEY&q=$TOPIC"
            curl -s "$URL" > pixabay.json
            LENGTH=$(jq '.hits | length' pixabay.json)
            if [ "$LENGTH" -gt 0 ]; then
              INDEX=$((RANDOM % LENGTH))
              VIDEO=$(jq -r ".hits[$INDEX].videos.medium.url" pixabay.json)
            fi
            # fallback Pexels
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl -H "Authorization: YOUR_PEXELS_KEY" \
                "https://api.pexels.com/videos/search?query=$TOPIC&per_page=1" > pexels.json
              VIDEO=$(jq -r '.videos[0].video_files[0].link' pexels.json)
            fi
            # fallback NASA image
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl "https://images-api.nasa.gov/search?q=$TOPIC&media_type=image" > nasa.json
              IMG=$(jq -r '.collection.items[0].links[0].href' nasa.json)
              if [ "$IMG" != "null" ] && [ "$IMG" != "" ]; then
                FILE="clips/clip_$COUNT.mp4"
                wget -q "$IMG" -O image.jpg
                ffmpeg -y -loop 1 -i image.jpg -t 7 -vf scale=1280:720 "$FILE"
                COUNT=$((COUNT+1))
                continue
              fi
            fi
            # download video jika ada
            if [ -n "$VIDEO" ] && [ "$VIDEO" != "null" ]; then
              FILE="clips/clip_$COUNT.mp4"
              wget -q "$VIDEO" -O "$FILE"
              if [ -s "$FILE" ]; then
                COUNT=$((COUNT+1))
              fi
            fi
          done
