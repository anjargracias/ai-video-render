name: render-video-final

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Install tools
      - name: Install ffmpeg and wget
        run: sudo apt update && sudo apt install -y ffmpeg wget

      # 3️⃣ Read topic
      - name: Read topic
        run: cat topic.txt

      # 4️⃣ Prepare clips folder
      - name: Prepare clips folder
        run: mkdir -p clips || true

      # 5️⃣ Download multiple clips
      - name: Download multiple clips
        run: |
          for i in $(seq 1 10); do
            echo "Downloading clip $i..."
            wget -q "https://samplelib.com/lib/preview/mp4/sample-5s.mp4" -O "clips/clip$i.mp4" || exit 1
          done

      # 6️⃣ List downloaded clips
      - name: Check clips folder
        run: ls -lh clips

      # 7️⃣ Cut random segments (5-7s)
      - name: Cut random segments
        run: |
          mkdir -p segments
          for f in clips/*.mp4; do
            duration=$((RANDOM % 3 + 5))  # 5-7 seconds
            filename=$(basename "$f" .mp4)
            ffmpeg -y -ss 0 -t $duration -i "$f" "segments/$filename.mp4"
          done

      # 8️⃣ Concatenate segments
      - name: Concatenate segments
        run: |
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -f concat -safe 0 -i segments.txt -c copy output.mp4

      # 9️⃣ Create thumbnail
      - name: Create thumbnail
        run: ffmpeg -i output.mp4 -ss 00:00:01 -vframes 1 thumb.jpg

      # 🔟 Upload video and thumbnail
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-and-thumb
          path: |
            output.mp4
            thumb.jpg        run: |
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -y -f concat -safe 0 -i segments.txt -c copy output.mp4

      - name: Generate thumbnail
        run: ffmpeg -y -i output.mp4 -ss 00:00:01 -vframes 1 thumb.jpg

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4

      - name: Upload thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail
          path: thumb.jpg
      - name: Concatenate segments
        run: |
          ffmpeg -f concat -safe 0 -i segments.txt -c:v libx264 -crf 23 -preset veryfast -c:a aac output.mp4

      - name: Generate thumbnail
        run: ffmpeg -i output.mp4 -ss 00:00:01 -vframes 1 thumbnail.png

      - name: List output files
        run: ls -lh output.mp4 thumbnail.png
