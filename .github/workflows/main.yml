name: multi-clip-render

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg and tools
        run: sudo apt update && sudo apt install -y ffmpeg imagemagick wget

      - name: Prepare clips folder
        run: mkdir -p clips segments

      - name: Download sample videos
        run: |
          for i in {1..10}; do
            wget -q https://samplelib.com/lib/preview/mp4/sample-5s.mp4 -O clips/video$i.mp4
          done

      - name: Cut random 5-7s segments
        run: |
          rm -f segments/*.mp4
          for file in clips/*.mp4; do
            DURATION=$((5 + RANDOM % 3))
            ffmpeg -y -ss 0 -t $DURATION -i "$file" -c copy "segments/$(basename "$file")"
          done

      - name: Create segments.txt for concat
        run: |
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          cat segments.txt

      - name: Concatenate segments
        run: |
          ffmpeg -f concat -safe 0 -i segments.txt -c:v libx264 -crf 23 -preset veryfast -c:a aac output.mp4

      - name: Generate thumbnail
        run: ffmpeg -i output.mp4 -ss 00:00:01 -vframes 1 thumbnail.png

      - name: List output files
        run: ls -lh output.mp4 thumbnail.png
