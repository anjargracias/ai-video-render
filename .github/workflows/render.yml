name: Render Multi-Clip Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # batasi maksimal 1 jam

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg wget jq

      - name: Set topic
        run: |
          TOPIC=$(cat topic.txt)
          echo "TOPIC=$TOPIC" >> $GITHUB_ENV

      - name: Download clips in batch
        run: |
          mkdir -p clips
          COUNT=0
          MAX_CLIPS=5   # download batch kecil
          while [ $COUNT -lt $MAX_CLIPS ]; do
            echo "Downloading clip $COUNT..."
            # contoh Pixabay
            URL="https://pixabay.com/api/videos/?key=52872254-a9cfc454d265a23c8b64db70d&q=$TOPIC"
            curl -s "$URL" > pixabay.json
            LENGTH=$(jq '.hits | length' pixabay.json)
            if [ "$LENGTH" -gt 0 ]; then
              INDEX=$((RANDOM % LENGTH))
              VIDEO=$(jq -r ".hits[$INDEX].videos.medium.url" pixabay.json)
            fi

            # fallback Pexels
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl -H "Authorization: XNTrlQTmElOSI8Btte8CuNnTjAbeAXmpSmqfo1GHx4gUEDPn4lEBIWYY" \
              "https://api.pexels.com/videos/search?query=$TOPIC&per_page=1" > pexels.json
              VIDEO=$(jq -r '.videos[0].video_files[0].link' pexels.json)
            fi

            # fallback NASA image
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl "https://images-api.nasa.gov/search?q=$TOPIC&media_type=image" > nasa.json
              IMG=$(jq -r '.collection.items[0].links[0].href' nasa.json)
              if [ "$IMG" != "null" ] && [ "$IMG" != "" ]; then
                FILE="clips/clip_$COUNT.mp4"
                wget -q "$IMG" -O image.jpg
                ffmpeg -y -loop 1 -i image.jpg -t 7 -vf scale=1280:720 "$FILE"
                COUNT=$((COUNT+1))
                continue
              fi
            fi

            # download video jika ada
            if [ -n "$VIDEO" ] && [ "$VIDEO" != "null" ]; then
              FILE="clips/clip_$COUNT.mp4"
              wget -q "$VIDEO" -O "$FILE"
              if [ -s "$FILE" ]; then
                COUNT=$((COUNT+1))
              else
                echo "Video download failed, skipping..."
              fi
            fi
          done

      - name: Concatenate clips
        run: |
          if [ "$(ls clips/*.mp4 2>/dev/null)" ]; then
            ls clips/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
            ffmpeg -f concat -safe 0 -i segments.txt -c copy output.mp4
          else
            echo "No clips downloaded!"
            exit 1
          fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4
