name: render-video

on:
  push:
    paths:
      - 'topic.txt'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: read topic
        run: |
          TOPIC=$(cat topic.txt)
          echo "TOPIC=$TOPIC" >> $GITHUB_ENV
          echo "Topic: $TOPIC"

      - name: install tools
        run: |
          sudo apt update
          sudo apt install ffmpeg jq curl wget -y

      - name: download multiple videos
        run: |
          mkdir -p clips
          COUNT=0
          while [ $COUNT -lt 10 ]; do
            # Coba Pixabay dulu
            URL="https://pixabay.com/api/videos/?key=52872254-a9cfc454d265a23c8b64db70d&q=$TOPIC"
            curl -s "$URL" > result.json
            VIDEO=$(jq -r ".hits[$RANDOM % (.hits|length)].videos.medium.url" result.json)
            
            # Kalau ada link
            if [ "$VIDEO" != "null" ] && [ "$VIDEO" != "" ]; then
              FILE="clips/clip_$COUNT.mp4"
              wget -q "$VIDEO" -O "$FILE"
              COUNT=$((COUNT+1))
            fi
          done

      - name: cut random segments
        run: |
          mkdir -p segments
          for f in clips/*.mp4; do
            DURATION=$((5 + RANDOM % 3)) # 5-7 detik
            ffmpeg -y -i "$f" -ss 0 -t $DURATION -c copy "segments/$(basename $f)"
          done

      - name: concatenate segments
        run: |
          # buat file daftar segmen
          ls segments/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -y -f concat -safe 0 -i segments.txt -c copy output.mp4

      - name: create thumbnail
        run: |
          ffmpeg -i output.mp4 -ss 00:00:05 -vframes 1 thumb.jpg

      - name: upload video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4

      - name: upload thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail
          path: thumb.jpg
