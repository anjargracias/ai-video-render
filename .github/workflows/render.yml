name: Render Video Final

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set topic
        run: |
          TOPIC=$(cat topic.txt)
          echo "TOPIC=$TOPIC" >> $GITHUB_ENV
          echo "Topic: $TOPIC"

      - name: Install tools
        run: sudo apt update && sudo apt install -y ffmpeg jq wget curl

      - name: Download and process clips
        run: |
          mkdir -p clips
          COUNT=0
          TARGET=$((10 + RANDOM % 6))
          while [ $COUNT -lt $TARGET ]; do
            VIDEO=""
            # Pixabay API
            URL="https://pixabay.com/api/videos/?key=52872254-a9cfc454d265a23c8b64db70d&q=$TOPIC"
            curl -s "$URL" -o pixabay.json
            cat pixabay.json
            LENGTH=$(jq '.hits | length' pixabay.json 2>/dev/null || echo 0)

            if [ "$LENGTH" -gt 0 ]; then
              INDEX=$((RANDOM % LENGTH))
              VIDEO=$(jq -r ".hits[$INDEX].videos.medium.url" pixabay.json 2>/dev/null || echo "")
            fi

            # Fallback Pexels API
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl -H "Authorization: XNTrlQTmElOSI8Btte8CuNnTjAbeAXmpSmqfo1GHx4gUEDPn4lEBIWYY" \
                "https://api.pexels.com/videos/search?query=$TOPIC&per_page=1" -o pexels.json
              cat pexels.json
              VIDEO=$(jq -r '.videos[0].video_files[0].link' pexels.json 2>/dev/null || echo "")
            fi

            # Fallback NASA image
            if [ -z "$VIDEO" ] || [ "$VIDEO" == "null" ]; then
              curl "https://images-api.nasa.gov/search?q=$TOPIC&media_type=image" -o nasa.json
              IMG=$(jq -r '.collection.items[0].links[0].href' nasa.json 2>/dev/null || echo "")
              if [ "$IMG" != "null" ] && [ "$IMG" != "" ]; then
                FILE="clips/clip_$COUNT.mp4"
                wget -q "$IMG" -O image.jpg
                ffmpeg -y -loop 1 -i image.jpg -t 7 -vf scale=1280:720 "$FILE"
                COUNT=$((COUNT+1))
                echo "Downloaded NASA image as clip_$COUNT.mp4"
                continue
              fi
            fi

            # Download video jika ada
            if [ -n "$VIDEO" ] && [ "$VIDEO" != "null" ]; then
              FILE="clips/clip_$COUNT.mp4"
              wget -q "$VIDEO" -O "$FILE"
              if [ -s "$FILE" ]; then
                COUNT=$((COUNT+1))
                echo "Downloaded video as clip_$COUNT.mp4"
              else
                echo "Video download failed, skipping..."
              fi
            fi
          done

      - name: Concatenate clips
        run: |
          ls clips/*.mp4 | sed "s/^/file '/; s/$/'/" > segments.txt
          ffmpeg -f concat -safe 0 -i segments.txt -c copy output.mp4

      - name: Create thumbnail
        run: ffmpeg -i output.mp4 -ss 00:00:01 -vframes 1 thumb.jpg

      - name: Upload final video & thumbnail
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: |
            output.mp4
            thumb.jpg
